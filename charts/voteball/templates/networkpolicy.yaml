# 1) Default-deny ALL ingress + egress in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# 2) Allow DNS egress (every pod needs CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# 3) Frontend: ingress from the ALB (its ENIs live in the VPC) on 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-to-frontend
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels: { app: frontend }
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: 10.0.0.0/16 }   # VPC (ALB target ENIs)
      ports:
        - { protocol: TCP, port: 8080 }
---
# 4) Backend: ingress from frontend only, on 5000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels: { app: backend }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: frontend } }
      ports:
        - { protocol: TCP, port: 5000 }
---
# 5) App egress: backend/worker/backup/frontend -> RDS (VPC) + AWS APIs (443 via NAT).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchExpressions:
      # `migrate` is the pre-upgrade schema Job. It needs the same RDS egress as the backend but must
      # NOT carry `app: backend`, which the backend Service selects -- that would route live HTTP to
      # a pod running a one-shot script.
      - { key: app, operator: In, values: [backend, worker, backup, frontend, migrate] }
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock: { cidr: 10.0.0.0/16 }     # VPC: RDS + pod IPs (backend<-frontend, OTel collector)
        - ipBlock: { cidr: 172.20.0.0/16 }   # EKS Service CIDR: reaching a Service by ClusterIP
          # ^ REQUIRED: frontend->backend goes via the backend Service ClusterIP (172.20.x), which the
          #   VPC CNI policy agent evaluates before DNAT-to-pod-IP -- without this, the proxy is denied.
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }       # SNS / S3 / Secrets Manager via NAT
