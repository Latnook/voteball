# SecretStore: ESO talks to Secrets Manager using the ESO controller's IRSA (scoped to this secret
# in Plan 2b). ExternalSecret materializes the K8s Secret app-secret that backend/worker envFrom.
# apiVersion v1: ESO 2.8.0 serves external-secrets.io/v1 (v1beta1 is no longer served).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.config.AWS_REGION | quote }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: app-secret        # the K8s Secret backend/worker read via envFrom
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.secretName | quote }}
