image:
  # All values marked FILLED-BY-SYNC are written by scripts/sync-values-from-tf.sh from Terraform
  # outputs on every deploy. Do not hand-edit them; they change whenever the stack is rebuilt.
  registry: "590183895228.dkr.ecr.il-central-1.amazonaws.com"
  tag: "e92bac9" # git-SHA tag pushed by scripts/build-push-ecr.sh
  pullPolicy: IfNotPresent

# Non-secret config -> ConfigMap app-config. DB_HOST is the Plan-3a RDS endpoint (set in Task 1/7).
config:
  DB_HOST: "voteball-eks-db.cfew0a2ywspq.il-central-1.rds.amazonaws.com"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  DB_SSLMODE: "require"
  AWS_REGION: "il-central-1" # matches aws_region in your tfvars
  SNS_TOPIC: "arn:aws:sns:il-central-1:590183895228:voteball-notifications"
  S3_BUCKET: "voteball-rollups-590183895228"
  S3_SNAPSHOT_PREFIX: "snapshots"

# ESO ExternalSecret: pulls voteball/app-secret from Secrets Manager into K8s Secret app-secret.
externalSecret:
  secretName: "voteball/app-secret"
  refreshInterval: "1h"

ingress:
  host: "voteball.latnook.com"
  certificateArn: "arn:aws:acm:il-central-1:590183895228:certificate/d9846777-dc94-4e32-be74-f097172c2479"
  wafAclArn: "arn:aws:wafv2:il-central-1:590183895228:regional/webacl/voteball-alb/98b77bff-69d5-4562-9fdd-1fb35ba16294"

# Alert rules (charts/voteball/templates/prometheusrule.yaml). Requires kube-prometheus-stack's
# PrometheusRule CRD, which terraform/addon-monitoring.tf installs. Set false to render the chart
# against a cluster without it -- `helm template` succeeds either way, but `helm install` fails on
# an unknown kind.
alerts:
  enabled: true

backup:
  roleArn: "arn:aws:iam::590183895228:role/voteball-backup-irsa"
  schedule: "0 2 * * *"

backend:
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

frontend:
  replicas: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

worker:
  # Singleton poller, not a request-serving tier — 2 replicas would just be
  # 2 processes independently polling and computing identical rollups.
  replicas: 1
  roleArn: "arn:aws:iam::590183895228:role/voteball-worker-irsa"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
