---
# `kubectl rollout restart` has no --all flag (unlike `get`/`delete`) --
# it needs explicit resource names. frontend is deliberately excluded: it
# doesn't consume app-config/app-secret via envFrom, so restarting it on a
# DB-config change would just be unnecessary churn (and a brief LB blip).
- name: restart app deployments
  command: kubectl rollout restart deployment/backend deployment/worker -n voteball-app
