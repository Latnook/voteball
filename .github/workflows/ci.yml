name: build-scan-push-deploy
#
# DISARMED 2026-07-20 — superseded by Jenkins.
# See docs/design/2026-07-20-jenkins-migration-design.md §10.
#
# Manual-only from here. GitHub Actions MUST be disarmed before the Jenkins webhook is enabled:
# with both armed, a single push starts both pipelines, and both race to rewrite
# charts/voteball/values.yaml and push to master. That collision is the reason this migration
# replaces the pipeline rather than running the two side by side.
#
# This file is kept, not deleted, so that reverting one commit restores a working pipeline while
# the Jenkins cutover is being verified. It is deleted in a follow-up commit once Task 11's
# verification passes — and terraform/github-oidc.tf last of all, since removing the IAM role is
# what makes the rollback expensive.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC federation to AWS
  contents: write # commit the image-tag bump back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Repo variables (Settings > Secrets and variables > Actions > Variables).
      REGION: ${{ vars.AWS_REGION }}
      REGISTRY: ${{ vars.ECR_REGISTRY }}
      PREFIX: ${{ vars.CLUSTER_NAME || 'voteball' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }} # repo variable = terraform output github_actions_role_arn
          aws-region: ${{ env.REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        run: |
          set -euo pipefail
          declare -A CTX=(
            ["${PREFIX}-backend"]=services/backend
            ["${PREFIX}-worker"]=services/worker
            ["${PREFIX}-nginx"]=services/frontend
            ["${PREFIX}-backup"]=services/backup
          )
          for repo in "${!CTX[@]}"; do
            docker build -t "${REGISTRY}/${repo}:${TAG}" "${CTX[$repo]}"
          done

      - name: Trivy scan our images (BLOCK on CRITICAL/HIGH)
        run: |
          set -euo pipefail
          for repo in "${PREFIX}-backend" "${PREFIX}-worker" "${PREFIX}-nginx"; do
            echo "::group::trivy ${repo}"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.58.1 image --severity CRITICAL,HIGH --exit-code 1 --ignore-unfixed \
              "${REGISTRY}/${repo}:${TAG}"
            echo "::endgroup::"
          done

      - name: Trivy scan backup image (report only)
        # The backup image is a third-party base (postgres:17-alpine + aws-cli) whose CVEs are upstream
        # Go-tooling issues we don't control; scan + surface them but don't block delivery.
        run: |
          echo "::group::trivy ${PREFIX}-backup (report only)"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.1 image --severity CRITICAL,HIGH --exit-code 0 --ignore-unfixed \
            "${REGISTRY}/${PREFIX}-backup:${TAG}"
          echo "::endgroup::"

      - name: Push images
        run: |
          set -euo pipefail
          for repo in "${PREFIX}-backend" "${PREFIX}-worker" "${PREFIX}-nginx" "${PREFIX}-backup"; do
            docker push "${REGISTRY}/${repo}:${TAG}"
          done

      - name: Bump image tag in the chart and commit (ArgoCD auto-syncs)
        run: |
          set -euo pipefail
          sed -i -E "s/^  tag: \".*\"/  tag: \"${TAG}\"/" charts/voteball/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/voteball/values.yaml
          git commit -m "ci: image tag ${TAG} [skip ci]" || { echo "no tag change"; exit 0; }
          git push
