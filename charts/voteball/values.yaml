image:
  registry: 590183895228.dkr.ecr.il-central-1.amazonaws.com
  tag: "abc3b4a" # git-SHA tag pushed by scripts/build-push-ecr.sh
  pullPolicy: IfNotPresent

# Non-secret config -> ConfigMap app-config. DB_HOST is the Plan-3a RDS endpoint (set in Task 1/7).
config:
  DB_HOST: "voteball-eks-db.cfew0a2ywspq.il-central-1.rds.amazonaws.com"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  DB_SSLMODE: "require"
  AWS_REGION: "il-central-1"
  SNS_TOPIC: "arn:aws:sns:il-central-1:590183895228:voteball-notifications"
  S3_BUCKET: "voteball-rollups-590183895228"
  S3_SNAPSHOT_PREFIX: "snapshots"

# ESO ExternalSecret: pulls voteball/app-secret from Secrets Manager into K8s Secret app-secret.
externalSecret:
  secretName: "voteball/app-secret"
  refreshInterval: "1h"

ingress:
  host: "voteball.latnook.com"
  certificateArn: "arn:aws:acm:il-central-1:590183895228:certificate/9449f111-3800-41f9-a7a3-02dd2cc32bd6"

backup:
  roleArn: "arn:aws:iam::590183895228:role/voteball-backup-irsa"
  schedule: "0 2 * * *"

backend:
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

frontend:
  replicas: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

worker:
  # Singleton poller, not a request-serving tier — 2 replicas would just be
  # 2 processes independently polling and computing identical rollups.
  replicas: 1
  roleArn: "arn:aws:iam::590183895228:role/voteball-worker-irsa"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
