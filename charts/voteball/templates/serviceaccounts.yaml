# frontend + backend: NO IRSA role (least privilege -- they never call AWS APIs).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
---
# worker: IRSA role for SNS publish + S3 snapshots write.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: {{ .Release.Namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.worker.roleArn | quote }}
---
# backup CronJob: its OWN IRSA role (S3 backups/ prefix only) -- separate from worker's snapshots/.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup
  namespace: {{ .Release.Namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.backup.roleArn | quote }}
