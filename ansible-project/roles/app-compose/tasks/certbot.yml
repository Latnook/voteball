---
# Shared by app-compose and k3s (included via
# "{{ role_path }}/../app-compose/tasks/certbot.yml" from the latter, the
# same cross-role pattern already used for the Docker build contexts) so
# there's one source of truth for how the TLS cert gets obtained and kept
# renewing, regardless of which playbook stands the box up.
- name: Install certbot
  dnf:
    name: certbot
    state: present
  become: true

- name: Install certbot Route53 DNS plugin
  # DNS-01, not HTTP-01: the frontend's k3s Service is a LoadBalancer whose
  # ServiceLB proxy binds host port 80 directly and would conflict with
  # certbot's --standalone authenticator on every renewal. DNS-01 needs no
  # port at all -- just the Route53 permissions granted to this instance's
  # role in terraform/modules/iam. This is also what makes it safe to run
  # this file from the k3s role even after k3s/ServiceLB already owns
  # port 80/443 -- the old --standalone flow could only ever run *before*
  # k3s existed.
  dnf:
    name: python3-certbot-dns-route53
    state: present
  become: true

- name: Check if SSL certificate exists
  stat:
    path: /etc/letsencrypt/live/{{ frontend_domain }}/fullchain.pem
  register: cert_stat
  become: true

- name: Check whether the existing cert already renews via dns-route53
  # Older certs may have been issued with --standalone; grep against a
  # missing renewal conf (fresh install) also returns non-zero, which is
  # exactly the "needs (re)issuing" case handled below.
  command: grep -qx 'authenticator = dns-route53' /etc/letsencrypt/renewal/{{ frontend_domain }}.conf
  register: dns_route53_active
  changed_when: false
  failed_when: false
  become: true

- name: Obtain/reissue SSL certificate (certbot dns-route53)
  # --force-renewal was removed: it existed only to migrate a still-valid
  # --standalone cert onto dns-route53 (plain certonly no-ops on a not-yet-due
  # cert, so the authenticator would never flip). That migration is long done,
  # and this task's `when` only runs on a fresh box (no cert) or one not yet on
  # dns-route53 -- so in practice it always hits the fresh-box path, where
  # certonly issues normally with no cert to force past. Forcing a reissue there
  # bought nothing and just burned Let's Encrypt's "5 certs per exact domain set
  # per 168h" budget on every destroy/redeploy. Without the flag, a re-run on a
  # box that already has a valid cert no-ops instead of needlessly reissuing.
  # --dns-route53-propagation-seconds was dropped: current certbot-dns-route53
  # polls Route53's GetChange for INSYNC instead of sleeping a fixed delay.
  command: >
    certbot certonly --dns-route53
    -d {{ frontend_domain }}
    --non-interactive --agree-tos
    -m {{ certbot_email }}
  become: true
  when: not cert_stat.stat.exists or dns_route53_active.rc != 0

- name: Enable and start the certbot renewal timer
  # Shipped disabled by the certbot RPM (certbot-renew.timer, runs twice
  # daily via /usr/bin/certbot renew). Actually renewing is a no-op unless
  # the cert is within its 30-day expiry window.
  systemd:
    name: certbot-renew.timer
    state: started
    enabled: true
  become: true
