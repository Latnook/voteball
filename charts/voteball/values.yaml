image:
  # All values marked FILLED-BY-SYNC are written by scripts/sync-values-from-tf.sh from Terraform
  # outputs on every deploy. Do not hand-edit them; they change whenever the stack is rebuilt.
  registry: "FILLED-BY-SYNC"
  tag: "abc3b4a" # git-SHA tag pushed by scripts/build-push-ecr.sh
  pullPolicy: IfNotPresent

# Non-secret config -> ConfigMap app-config. DB_HOST is the Plan-3a RDS endpoint (set in Task 1/7).
config:
  DB_HOST: "FILLED-BY-SYNC"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  DB_SSLMODE: "require"
  AWS_REGION: "il-central-1" # matches aws_region in your tfvars
  SNS_TOPIC: "FILLED-BY-SYNC"
  S3_BUCKET: "FILLED-BY-SYNC"
  S3_SNAPSHOT_PREFIX: "snapshots"

# ESO ExternalSecret: pulls voteball/app-secret from Secrets Manager into K8s Secret app-secret.
externalSecret:
  secretName: "voteball/app-secret"
  refreshInterval: "1h"

ingress:
  host: "FILLED-BY-SYNC"
  certificateArn: "FILLED-BY-SYNC"

backup:
  roleArn: "FILLED-BY-SYNC"
  schedule: "0 2 * * *"

backend:
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

frontend:
  replicas: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

worker:
  # Singleton poller, not a request-serving tier — 2 replicas would just be
  # 2 processes independently polling and computing identical rollups.
  replicas: 1
  roleArn: "FILLED-BY-SYNC"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
