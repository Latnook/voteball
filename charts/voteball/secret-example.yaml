# EXAMPLE ONLY -- real values live in AWS Secrets Manager (voteball/app-secret) and are synced by ESO.
# This documents the shape. Seed the real secret once (manual op):
#   aws secretsmanager put-secret-value --secret-id voteball/app-secret --region il-central-1 \
#     --secret-string '{"DB_USER":"postgres","DB_PASS":"<matches restored RDS>","ADMIN_USERNAME":"...",
#                       "ADMIN_PASSWORD_HASH":"<werkzeug hash>","ADMIN_SESSION_SECRET":"<32+ random>"}'
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: devops-app
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASS: "REPLACE"
  ADMIN_USERNAME: "REPLACE"
  ADMIN_PASSWORD_HASH: "REPLACE"
  ADMIN_SESSION_SECRET: "REPLACE"
